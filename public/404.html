<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0;url=/RoboCOIN_Home/">
  <script>
    // Preserve path for SPA history mode on GitHub Pages
    (function() {
      const origin = window.location.origin;
      const base = '/RoboCOIN_Home/';
      const path = window.location.pathname.replace(/^\/RoboCOIN_Home\/?/, '');
      const search = window.location.search || '';
      const hash = window.location.hash || '';
      const target = origin + base + '#' + (path ? path : '') + search + hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
